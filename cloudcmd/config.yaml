---
name: CloudCMD
version: dev
slug: cloudcmd
description: Cloud Commander a file manager for the web with console and editor.
url: https://github.com/barisozdag/addon-cloudcmd
codenotary: baris@ozdag.net
webui: http://[HOST]:[PORT:8000]/web
ingress: true
ingress_stream: true
panel_icon: "mdi:file-search"
startup: services
init: false
arch:
  - aarch64
  - amd64
  - armv7
map:
  - media:rw
  - share:rw
  - ssl
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Web interface
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
